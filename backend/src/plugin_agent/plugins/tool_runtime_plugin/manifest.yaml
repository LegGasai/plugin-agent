descriptor:
  id: tool.runtime
  version: 1.0.0
  name: 工具运行时
  description: 统一发现工具资源、校验参数并路由工具调用。
  categories: [tool_runtime]
  tags: [工具, 运行时, 路由]
  config_schema_ref: schema://tool.runtime.config.v1
  provides:
    - name: tool.registry.list
      version: 1.0.0
      input_schema_ref: schema://tool.registry.list.input.v1
      output_schema_ref: schema://tool.registry.list.output.v1
    - name: tool.invoke
      version: 1.0.0
      input_schema_ref: schema://tool.invoke.input.v1
      output_schema_ref: schema://tool.invoke.output.v1
resources:
  - kind: tool_runtime
    id: default
    title: Tool Runtime
    description: Provides tool registry and invocation.
    invoke_capability: tool.invoke
    schema_refs:
      list_input: schema://tool.registry.list.input.v1
      list_output: schema://tool.registry.list.output.v1
      invoke_input: schema://tool.invoke.input.v1
      invoke_output: schema://tool.invoke.output.v1
schemas:
  - schema_ref: schema://tool.runtime.config.v1
    json_schema:
      type: object
      additionalProperties: false
      properties:
        audit:
          type: object
          additionalProperties: false
          properties:
            enabled:
              type: boolean
              title: Enable Tool Audit
              default: true
  - schema_ref: schema://tool.registry.list.input.v1
    json_schema:
      type: object
      additionalProperties: false
      properties: {}
  - schema_ref: schema://tool.registry.list.output.v1
    json_schema:
      type: object
      required: [tools]
      additionalProperties: false
      properties:
        tools:
          type: array
          items:
            type: object
  - schema_ref: schema://tool.invoke.input.v1
    json_schema:
      type: object
      required: [tool_id, arguments]
      additionalProperties: false
      properties:
        tool_id:
          type: string
        arguments:
          type: object
  - schema_ref: schema://tool.invoke.output.v1
    json_schema:
      type: object
      required: [tool_id, result, provider_capability]
      additionalProperties: false
      properties:
        tool_id:
          type: string
        result: {}
        provider_capability:
          type: string
