descriptor:
  id: skill.registry
  version: 1.0.0
  name: 技能注册表
  description: 加载本地 SKILL.md 技能文件，并提供技能查询能力。
  categories: [skill]
  tags: [技能, 注册表, 本地]
  config_schema_ref: schema://skill.registry.config.v1
  provides:
    - name: skill.list
      version: 1.0.0
      input_schema_ref: schema://skill.list.input.v1
      output_schema_ref: schema://skill.list.output.v1
    - name: skill.activate
      version: 1.0.0
      input_schema_ref: schema://skill.activate.input.v1
      output_schema_ref: schema://skill.activate.output.v1
    - name: skill.read_file
      version: 1.0.0
      input_schema_ref: schema://skill.read_file.input.v1
      output_schema_ref: schema://skill.read_file.output.v1
resources:
  - kind: skill
    id: registry
    title: Skill Registry
    description: Lists and retrieves local markdown skills.
    invoke_capability: skill.list
    schema_refs:
      list_input: schema://skill.list.input.v1
      list_output: schema://skill.list.output.v1
  - kind: tool
    id: activate_skill
    title: Activate Skill
    description: Activate a local skill and inspect its metadata and file tree.
    invoke_capability: skill.activate
    schema_refs:
      input: schema://skill.activate.input.v1
      output: schema://skill.activate.output.v1
  - kind: tool
    id: read_skill_file
    title: Read Skill File
    description: Read a regular file inside an enabled skill directory.
    invoke_capability: skill.read_file
    schema_refs:
      input: schema://skill.read_file.input.v1
      output: schema://skill.read_file.output.v1
schemas:
  - schema_ref: schema://skill.registry.config.v1
    json_schema:
      type: object
      additionalProperties: false
      properties:
        skill_dirs:
          type: array
          title: Skill Directories
          items:
            type: string
        max_file_bytes:
          type: integer
          title: Max File Bytes
          minimum: 1024
          default: 524288
  - schema_ref: schema://skill.list.input.v1
    json_schema:
      type: object
      additionalProperties: false
      properties: {}
  - schema_ref: schema://skill.list.output.v1
    json_schema:
      type: object
      required: [skills]
      additionalProperties: false
      properties:
        skills:
          type: array
          items:
            type: object
  - schema_ref: schema://skill.activate.input.v1
    json_schema:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name:
          type: string
          description: Enabled skill name.
  - schema_ref: schema://skill.activate.output.v1
    json_schema:
      type: object
      required: [result]
      additionalProperties: false
      properties:
        result:
          type: object
  - schema_ref: schema://skill.read_file.input.v1
    json_schema:
      type: object
      required: [name, path]
      additionalProperties: false
      properties:
        name:
          type: string
          description: Enabled skill name.
        path:
          type: string
          description: Relative path inside the skill directory, for example SKILL.md.
  - schema_ref: schema://skill.read_file.output.v1
    json_schema:
      type: object
      required: [result]
      additionalProperties: false
      properties:
        result:
          type: object
