security:
  allow_raw_requests: false
  allowed_schemes:
    - https
  allowed_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - HEAD
  allowed_hosts: []
  allow_private_networks: false
  allow_redirects: false
  default_timeout_seconds: 15
  max_timeout_seconds: 30
  max_response_bytes: 65536
default_headers: {}
default_secret_headers: {}
endpoints: {}
