descriptor:
  id: context.compressor.model
  version: 1.1.0
  name: 模型上下文摘要压缩
  description: 调用已绑定模型提供商，将较长对话上下文压缩为续跑摘要。
  categories: [context]
  tags: [上下文, 压缩, 摘要, 模型]
  config_schema_ref: schema://context.compressor.model.config.v1
  requires:
    - capability: model.chat
      version: ">=1.0 <2.0"
      required: true
  provides:
    - name: context.compressor.compress
      version: 1.0.0
      input_schema_ref: schema://context.compressor.compress.input.v1
      output_schema_ref: schema://context.compressor.compress.output.v1
runtime:
  type: python.worker
  entrypoint: plugin.py:ModelContextCompressorPlugin
resources:
  - kind: context
    id: model-summary
    title: Model Context Compressor
    description: Uses model.chat to compact transcript messages into a handoff summary.
    invoke_capability: context.compressor.compress
    schema_refs:
      input: schema://context.compressor.compress.input.v1
      output: schema://context.compressor.compress.output.v1
schemas:
  - schema_ref: schema://context.compressor.model.config.v1
    json_schema:
      type: object
      additionalProperties: false
      properties:
        max_summary_chars:
          type: integer
          title: Max Summary Chars
          minimum: 100
          maximum: 65536
          default: 32768
        system_prompt:
          type: string
          title: System Prompt
  - schema_ref: schema://context.compressor.compress.input.v1
    json_schema:
      type: object
      required: [messages]
      additionalProperties: false
      properties:
        messages:
          type: array
          items:
            type: object
  - schema_ref: schema://context.compressor.compress.output.v1
    json_schema:
      type: object
      required: [summary]
      additionalProperties: false
      properties:
        summary:
          type: string
        provider:
          type: object
