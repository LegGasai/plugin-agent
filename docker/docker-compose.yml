name: plugin-agent

networks:
  plugin-agent-network:
    driver: bridge

services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: plugin-agent-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - PLUGIN_AGENT_MARKET_DIR=${PLUGIN_AGENT_MARKET_DIR:-/app/plugin-market}
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/plugin-agent-data:/app/.plugin-agent
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - plugin-agent-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_PLUGIN_AGENT_API: ${VITE_PLUGIN_AGENT_API:-/plugin-agent-api}
    container_name: plugin-agent-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - plugin-agent-network
